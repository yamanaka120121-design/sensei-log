const STORAGE_HABITS = 'sensei_habits';
let habitDate = dateToString(new Date()); // 習慣チェックの表示日

function loadHabits() {
  try { return JSON.parse(localStorage.getItem(STORAGE_HABITS) || '{}'); } catch { return {}; }
}
function saveHabitsData(data) {
  try { localStorage.setItem(STORAGE_HABITS, JSON.stringify(data)); } catch {}
}
function setHabitRating(habitId, val, date) {
  const d = date || habitDate;
  const data = loadHabits();
  if (!data[d]) data[d] = {};
  data[d][habitId] = (data[d][habitId] === val) ? 0 : val; // 同じ値タップで解除
  saveHabitsData(data);
}

// 評価値→ラベル変換 (5=100%完璧〜1=✕取組なし)
// scale: 5=100%, 4=80%, 3=50%, 2=20%, 1=0%
const HABIT_LABELS = {5:'100%', 4:'80%', 3:'50%', 2:'20%', 1:'✕'};

// スコア計算ヘルパー（binary/scale 共通）
function calcHabitScore(dateData) {
  const SCALE_PCT = {5:100, 4:80, 3:50, 2:20, 1:0};
  const answered = HABITS.filter(h => (dateData[h.id]||0) > 0).length;
  const total = HABITS.length;
  const totalScore = HABITS.reduce((s, h) => {
    const v = dateData[h.id] || 0;
    if (v === 0) return s;
    return s + (h.type === 'binary' ? (v === 2 ? 100 : 0) : (SCALE_PCT[v] ?? 0));
  }, 0);
  const avgPct = answered === 0 ? 0 : Math.round(totalScore / answered);
  return { answered, total, avgPct };
}

function renderHabitItems(container, dateKey, onChange) {
  const data = loadHabits();
  const dateData = data[dateKey] || {};

  // カテゴリ別
  const cats = [...new Set(HABITS.map(h => h.cat))];
  let html = '';
  cats.forEach(cat => {
    html += `<div class="habit-section-label">${cat}</div>`;
    HABITS.filter(h => h.cat === cat).forEach(h => {
      const val = dateData[h.id] || 0;
      const checked = val > 0;
      let ratingHtml = '';
      if (h.type === 'binary') {
        ratingHtml = `
          <div class="habit-binary" data-habit="${h.id}">
            <button class="hb-btn hb-yes${val===2?' sel':''}" data-val="2">できた ✓</button>
            <button class="hb-btn hb-no${val===1?' sel':''}" data-val="1">できなかった ✗</button>
          </div>
          <div class="habit-def-hint">${escHtml(h.def)}</div>`;
      } else {
        const criteriaText = val > 0 ? escHtml(h.criteria?.[val] || '') : '';
        ratingHtml = `
          <div class="habit-rating habit-scale" data-habit="${h.id}">
            ${[5,4,3,2,1].map(v=>`<button class="habit-star${val===v?' sel-'+v:''}" data-val="${v}">${HABIT_LABELS[v]}</button>`).join('')}
          </div>
          <div class="habit-criteria${checked?' visible':''}" id="hc-${h.id}">${criteriaText}</div>`;
      }
      html += `<div class="habit-item${checked?' checked':''}">
        <div class="habit-item-top"><div class="habit-label">${escHtml(h.label)}</div></div>
        ${ratingHtml}
      </div>`;
    });
  });
  container.innerHTML = html;

  // イベントリスナー（binary: .habit-binary、scale: .habit-scale）
  container.querySelectorAll('[data-habit]').forEach(row => {
    const habitId = row.dataset.habit;
    const habit = HABITS.find(h => h.id === habitId);
    row.querySelectorAll('[data-val]').forEach(btn => {
      btn.addEventListener('click', () => {
        const v = parseInt(btn.dataset.val);
        setHabitRating(habitId, v, dateKey);
        // scale: criteria テキスト更新
        if (habit?.type !== 'binary') {
          const criteriaEl = container.querySelector(`#hc-${habitId}`);
          if (criteriaEl) {
            const newVal = (loadHabits()[dateKey]||{})[habitId]||0;
            criteriaEl.textContent = newVal > 0 ? (habit.criteria?.[newVal]||'') : '';
            criteriaEl.classList.toggle('visible', newVal > 0);
          }
        }
        // 親コールバック or タブ再描画
        if (onChange) onChange();
        else renderHabitTab();
      });
    });
  });
  const {answered, total} = calcHabitScore(dateData);
  return {answered, total};
}

function renderHabitTab() {
  const d = stringToDate(habitDate);
  const dateLabel = `${d.getMonth()+1}月${d.getDate()}日（${DOW_JP[d.getDay()]}）`;
  const dateData = (loadHabits()[habitDate]) || {};
  const {answered, total, avgPct} = calcHabitScore(dateData);

  const panel = document.getElementById('mob-habit');
  const header = `
    <div class="habit-date-nav">
      <button class="habit-date-btn" id="habit-prev-btn">‹</button>
      <span class="habit-date-label">${dateLabel}</span>
      <button class="habit-date-btn" id="habit-next-btn">›</button>
    </div>
    <div class="habit-header-card">
      <div class="habit-header-top">
        <span class="habit-header-title">習慣チェック（${answered}/${total}）</span>
        <span class="habit-score-txt">${avgPct}%</span>
      </div>
      <div class="habit-progress-wrap"><div class="habit-progress-fill" style="width:${avgPct}%"></div></div>
    </div>`;
  const itemsWrap = document.createElement('div');
  panel.innerHTML = header;
  panel.appendChild(itemsWrap);
  renderHabitItems(itemsWrap, habitDate, renderHabitTab);

  document.getElementById('habit-prev-btn').addEventListener('click',()=>{
    const d2=stringToDate(habitDate); d2.setDate(d2.getDate()-1); habitDate=dateToString(d2); renderHabitTab();
  });
  document.getElementById('habit-next-btn').addEventListener('click',()=>{
    const d2=stringToDate(habitDate); d2.setDate(d2.getDate()+1); habitDate=dateToString(d2); renderHabitTab();
  });
}

document.getElementById('btn-prev').addEventListener('click', ()=>shift(-1));
document.getElementById('btn-next').addEventListener('click', ()=>shift(1));
document.getElementById('btn-today').addEventListener('click', goToday);

if (!localStorage.getItem(SCHEMA_VERSION)) {
  localStorage.removeItem(STORAGE_EVENTS); localStorage.removeItem(STORAGE_REFLECT);
  localStorage.setItem(SCHEMA_VERSION,'1'); userEvents=[];
}

// 来週の特別スケジュール初期設定（一度だけ実行）
const PRESET_V = 'sensei_preset_20260519';
if (!localStorage.getItem(PRESET_V)) {
  // 5/19(火)・5/20(水)・5/21(木): テスト期間 09:00-12:00
  ['2026-05-19','2026-05-20','2026-05-21'].forEach(d => {
    dayPatterns[d] = 'none';
    userEvents.push({ id:uid(), title:'定期テスト', cat:'event', date:d, start:'09:00', end:'12:00', sub:'テスト期間' });
  });
  // 5/22(金): 校外学習（京都）
  dayPatterns['2026-05-22'] = 'none';
  userEvents.push({ id:uid(), title:'校外学習（京都）', cat:'event', date:'2026-05-22', start:'08:00', end:'17:30', sub:'校外学習（朝〜夕方）' });
  // 5/23(土): 吹奏楽部 定期演奏会練習
  userEvents.push({ id:uid(), title:'吹奏楽部 定期演奏会練習', cat:'club', date:'2026-05-23', start:'09:00', end:'16:00', sub:'定期演奏会' });
  saveDayPatterns(dayPatterns);
  saveUserEvents(userEvents);
  localStorage.setItem(PRESET_V, '1');
}

// 修正パッチ v2：前回の誤設定（5/23を金曜扱い・テスト15:30）を正しい内容に更新
const PRESET_V2 = 'sensei_preset_20260519v2';
if (!localStorage.getItem(PRESET_V2)) {
  // 誤って追加された旧イベントを削除
  userEvents = userEvents.filter(ev =>
    ev.title !== '定期テスト' && ev.title !== '校外学習（京都）'
  );
  // 5/23のパターンを元に戻す（土曜日なのでパターン不要）
  delete dayPatterns['2026-05-23'];
  // 5/22(金)に校外学習のパターンを設定
  ['2026-05-19','2026-05-20','2026-05-21'].forEach(d => { dayPatterns[d] = 'none'; });
  dayPatterns['2026-05-22'] = 'none';
  // 正しいイベントを追加
  ['2026-05-19','2026-05-20','2026-05-21'].forEach(d => {
    userEvents.push({ id:uid(), title:'定期テスト', cat:'event', date:d, start:'09:00', end:'12:00', sub:'テスト期間' });
  });
  userEvents.push({ id:uid(), title:'校外学習（京都）', cat:'event', date:'2026-05-22', start:'08:00', end:'17:30', sub:'校外学習（朝〜夕方）' });
  // 5/23(土): 吹奏楽部 定期演奏会練習（吹奏楽部イベントは重複チェック）
  if (!userEvents.some(ev => ev.date === '2026-05-23' && ev.title === '吹奏楽部 定期演奏会練習')) {
    userEvents.push({ id:uid(), title:'吹奏楽部 定期演奏会練習', cat:'club', date:'2026-05-23', start:'09:00', end:'16:00', sub:'定期演奏会' });
  }
  saveDayPatterns(dayPatterns);
  saveUserEvents(userEvents);
  localStorage.setItem(PRESET_V2, '1');
}

initMobLog(); buildCalendar(); scrollToSchoolStart(); renderLogEntries(); updateRefDateLabel();
if (isMobile()) { buildMobWeekStrip(); switchMobTab('cal'); }
initGreeting();
document.getElementById('morning-q-text').textContent = getTodayMorningQuestion();
setInterval(updateNowLine, 60000);
</script>
</body>
